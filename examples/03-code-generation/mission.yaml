apiVersion: aesp.mission/v1
kind: Mission
metadata:
  id: example.03-code-generation
  profilePortable: true
spec:
  goal: "Code-generation workflow"
  requiredCapabilities:
    - coding
    - tools
  successCriteria:
    - example-complete
  budget:
    maxSteps: 20
    maxTokens: 50000
    maxWallSec: 600
  constraints:
    - capability-routing-only
    - no-vendor-model-names
